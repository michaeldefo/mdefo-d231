<h2>📩 Me contacter</h2>

<form id="contactForm">

   <label for="name">Nom :</label><br>
   <input type="text" id="name" required><br><br>

   <label for="email">Votre email :</label><br>
   <input type="email" id="email" required><br><br>

   <h3>📌 Sujet(s) de votre message :</h3>

   <label><input type="checkbox" name="choix" value="Je souhaite en savoir plus sur le DevOps (Partage de sources et ressources, Echanges)"> En savoir plus sur le DevOps</label><br>
   <label><input type="checkbox" name="choix" value="Je veux comprendre les métiers DevOps du point de vue de votre parcours."> Echange sur les Métiers DevOps</label><br>
   <label><input type="checkbox" name="choix" value="Je recherche une assistance ou un accompagnement technique (mentoring ou entraide)."> Explorer la possibilité de mentoring ou entraide</label><br>
   <label><input type="checkbox" name="choix" value="Je veux collaborer ou proposer un projet."> Explorer des pistes de collaboration</label><br>
   <label><input type="checkbox" name="choix" value="Je veux corriger une section du site."> Collaboration: Revue contenu/Correction</label><br>
   <label><input type="checkbox" name="choix" value="Je veux en savoir plus sur votre parcours."> Echanger sur Votre parcours </label><br><br>
   
   <button type="submit">Envoyer</button>

</form>

<script>
// --- Fonction ROT13 ---
function rot13(str) {
  return str.replace(/[a-zA-Z]/g, function(c){
    return String.fromCharCode(
      (c <= "Z" ? 90 : 122) >= (c = c.charCodeAt(0) + 13)
      ? c : c - 26
    );
  });
}

// Email chiffré ROT13 (dtmghislain@gmail.com)
const encryptedMail = "qgztuvfyvna@tznvy.pbz";
const decodedMail = rot13(encryptedMail);

document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const nom = encodeURIComponent(document.getElementById("name").value);
  const mailUser = encodeURIComponent(document.getElementById("email").value);

  // Récupération des checkbox cochées
  const checkboxes = document.querySelectorAll('input[name="choix"]:checked');
  let selected = [];

  checkboxes.forEach(cb => selected.push(cb.value));

  // Génération automatique du message final
  const messageGenere =
      selected.length > 0
      ? selected.join("%0D%0A- ")    
      : "Aucun sujet sélectionné.";

  const subject = encodeURIComponent("Contact depuis le site DevOps de Michael D.");

  const body =
      "Nom : " + nom + "%0D%0A" +
      "Email : " + mailUser + "%0D%0A%0D%0A" +
      "Sujet(s) choisi(s) :%0D%0A- " + messageGenere + "%0D%0A";

  window.location.href =
      "mailto:" + decodedMail + "?subject=" + subject + "&body=" + body;
});
</script>
